name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with pylint
        run: |
          pip install pylint
          pylint --rcfile=.pylintrc app || true

  build-and-smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Run migrations (Alembic)
        env:
          SQLALCHEMY_URL: ${{ secrets.SQLALCHEMY_URL }}
        run: |
          if [ -z "$SQLALCHEMY_URL" ]; then
            echo "SQLALCHEMY_URL not set; skipping migrations" && exit 0
          fi
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic
          export SQLALCHEMY_URL="$SQLALCHEMY_URL"
          alembic upgrade head
      - name: Build Docker image
        run: |
          docker build -t backend-fastapi:ci .
      - name: Run container
        run: |
          docker run -d --name backend-ci -p 8000:8000 backend-fastapi:ci
          # wait for server to become healthy
          for i in {1..30}; do
            if curl -sS http://localhost:8000/ >/dev/null; then
              echo 'server ready' && break
            fi
            sleep 1
          done
      - name: Smoke test
        run: |
          curl -sS http://localhost:8000/ | jq || true
      - name: Cleanup
        if: always()
        run: |
          docker rm -f backend-ci || true
